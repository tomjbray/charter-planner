<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charter Route Planner</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Barlow+Condensed:wght@300;400;500;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <span class="logo-mark">✦</span>
      <div>
        <h1>Charter Planner</h1>
        <p class="tagline">Route · Aircraft · Range</p>
      </div>
    </div>
    <div class="header-status" id="dbStatus">Loading airport data…</div>
  </div>
</header>

<div class="layout">

  <!-- ── Left panel ── -->
  <aside class="sidebar">

    <!-- Route inputs -->
    <section class="panel">
      <div class="panel-label">Route</div>

      <div class="airport-block" id="origBlock">
        <div class="block-header">
          <span class="block-dot origin-dot"></span>
          <span class="block-title">Origin</span>
        </div>
        <input class="iata-input" id="origInput" maxlength="3" placeholder="LHR" autocomplete="off" spellcheck="false">
        <div class="airport-detail" id="origInfo"></div>
      </div>

      <div class="route-line">
        <div class="route-line-track"></div>
        <div class="route-line-plane">✈</div>
      </div>

      <div class="airport-block" id="destBlock">
        <div class="block-header">
          <span class="block-dot dest-dot"></span>
          <span class="block-title">Destination</span>
        </div>
        <input class="iata-input dest" id="destInput" maxlength="3" placeholder="JFK" autocomplete="off" spellcheck="false">
        <div class="airport-detail" id="destInfo"></div>
      </div>
    </section>

    <!-- Passengers -->
    <section class="panel">
      <div class="panel-label">Passengers</div>
      <div class="pax-row">
        <button class="pax-btn" id="paxDown">−</button>
        <div class="pax-display">
          <span id="paxCount">8</span>
          <span class="pax-label">passengers</span>
        </div>
        <button class="pax-btn" id="paxUp">+</button>
      </div>
    </section>

    <!-- Options -->
    <section class="panel">
      <div class="panel-label">Options</div>
      <label class="option-row" for="singleEngineCheck">
        <input type="checkbox" id="singleEngineCheck" checked>
        <span class="option-label">Include single engine aircraft</span>
      </label>
    </section>

    <!-- Route summary -->
    <section class="panel route-summary" id="routeSummary" style="display:none">
      <div class="panel-label">Route Summary</div>
      <div class="summary-grid">
        <div class="summary-item">
          <div class="summary-val" id="summaryDist">—</div>
          <div class="summary-key">Distance (nm)</div>
        </div>
        <div class="summary-item">
          <div class="summary-val" id="summaryKm">—</div>
          <div class="summary-key">Distance (km)</div>
        </div>
        <div class="summary-item">
          <div class="summary-val" id="summaryPax">—</div>
          <div class="summary-key">Passengers</div>
        </div>
        <div class="summary-item">
          <div class="summary-val" id="summaryRwy">—</div>
          <div class="summary-key">Min Runway (ft)</div>
        </div>
      </div>
    </section>

    <!-- Find aircraft button -->
    <button class="find-btn" id="findBtn" disabled>Find Suitable Aircraft</button>

  </aside>

  <!-- ── Main area ── -->
  <main class="main-area">

    <!-- Map -->
    <div class="map-wrap">
      <div id="map"></div>
      <div class="map-empty" id="mapEmpty">
        <div class="map-empty-icon">✦</div>
        <div class="map-empty-text">Enter origin and destination to plot route</div>
      </div>
    </div>

    <!-- Aircraft results -->
    <div class="results-area" id="resultsArea" style="display:none">
      <div class="results-header">
        <div class="results-title">Suitable Aircraft</div>
        <div class="results-meta" id="resultsMeta"></div>
        <div class="filter-tabs" id="filterTabs"></div>
      </div>
      <div class="aircraft-grid" id="aircraftGrid"></div>
    </div>

  </main>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
